name: Test INT Branch

on:
  pull_request:
    branches:
      - int

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Checkout
        uses: actions/checkout@v3
        with:
          repository: step-security/secure-repo
          path: secure-repo
          ref: int

      - run: ls -R

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.19.2

      - name: Update go.mod with latest commit of secure-repo int branch
        run: |
          cd core/
          go get github.com/step-security/secure-repo@int
          go mod tidy
          cat go.mod
          cd ..
          cd outpost/
          go get github.com/step-security/secure-repo@int
          go mod tidy
          cat go.mod
          cd ..
          go get github.com/step-security/secure-repo@int
          go mod tidy
          cat go.mod

      - name: Build Outpost
        run: |
          cd outpost/
          go build

      - run: go test ./... -v
      - run: go test ./core/ -v
