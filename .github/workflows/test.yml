name: Test Prod branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Checkout
        uses: actions/checkout@v3
        with:
          repository: step-security/secure-repo
          path: secure-repo

      - run: ls -R

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.19.2

      - name: Build Outpost
        run: |
          cd outpost/
          go build

      - run: go test ./...
      - run: go test ./core/ -v
